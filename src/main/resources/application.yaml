spring:
  application:
    name: school-management

  profiles:
    active: ${SPRING_PROFILE:dev}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
  servlet:
    context-path: /api

app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry-minutes: 15
    refresh-token-expiry-days: 7
  otp:
    expiry-minutes: 10
    max-attempts: 3
    rate-limit-per-15-min: 3
  mail:
    from: ${MAIL_FROM}